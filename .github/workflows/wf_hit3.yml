name: HIT3 CI/CD

on:
  push:
    branches: [ "dev", "main" ]
    paths:
      - 'hit3/**'
      - '.github/workflows/wf_hit3.yml'

jobs:

  servidor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install & test
        run: |
          cd hit3/servidor
          pip install -r requirements.txt
          pytest tests/

      - name: Login Docker
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./hit3/servidor
          push: true
          tags: |
            valen190306/sd-tp2-hit3-servidor:latest
            valen190306/sd-tp2-hit3-servidor:${{ github.sha }}