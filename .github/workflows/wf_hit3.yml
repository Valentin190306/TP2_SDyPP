name: HIT3 CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'hit3/**'
      - '.github/workflows/hit3.yml'

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hit3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./hit3
          push: true
          # Asegúrate de reemplazar "usuario" con tu nombre de usuario real en Docker Hub
          tags: |
            usuario/hit3:latest
            usuario/hit3:${{ github.sha }}