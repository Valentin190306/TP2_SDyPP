name: HIT1 CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'hit1/**'
      - '.github/workflows/hit1.yml'

jobs:

  server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install & test
        run: |
          cd hit1/servidor
          pip install -r requirements.txt
          pip install pytest
          pytest

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./hit1/servidor
          push: true
          tags: |
            valen190306/hit1-servidor:latest
            valen190306/hit1-servidor:${{ github.sha }}

  worker_a:
    runs-on: ubuntu-latest

    steps:
