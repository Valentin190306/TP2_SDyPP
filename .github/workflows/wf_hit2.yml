name: HIT2 CI/CD

on:
  push:
    branches: [ "dev", "main" ]
    paths:
      - 'hit2/**'
      - '.github/workflows/wf_hit2.yml'

jobs:

  servicio_a:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install & test
        run: |
          cd hit1/servicio_a
          pip install -r requirements.txt
          pytest tests/

      - name: Login Docker
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./hit2/servicio_a
          push: true
          tags: |
            valen190306/sd-tp2-hit1-servicio-a:latest
            valen190306/sd-tp2-hit1-servicio-a:${{ github.sha }}

  servicio_b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install & test
        run: |
          cd hit2/servicio_b
          pip install -r requirements.txt
          pytest tests/

      - name: Login Docker
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./hit2/servicio_b
          push: true
          tags: |
            valen190306/sd-tp2-hit1-servicio-b:latest
            valen190306/sd-tp2-hit1-servicio-b:${{ github.sha }}

  servidor:
    runs-on: ubuntu-latest
    needs: [servicio_a, servicio_b]  # el servidor se buildea solo si los servicios pasaron
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install & test
        run: |
          cd hit2/servidor
          pip install -r requirements.txt
          pytest tests/

      - name: Login Docker
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./hit2/servidor
          push: true
          tags: |
            valen190306/sd-tp2-hit2-servidor:latest
            valen190306/sd-tp2-hit2-servidor:${{ github.sha }}